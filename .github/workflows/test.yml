name: brew test-bot

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: tap-src

      - name: Tap this repo
        run: |
          TAP_DIR="$(brew --repository)/Library/Taps/legionio/homebrew-tap"
          rm -rf "$TAP_DIR"
          mkdir -p "$TAP_DIR"
          cp -a tap-src/. "$TAP_DIR/"

      - name: Install legion-tty (pulls legionio + legionio-ruby)
        run: brew install legionio/tap/legion-tty

      - name: Test legionio-ruby
        run: brew test legionio/tap/legionio-ruby

      - name: Test legionio
        run: brew test legionio/tap/legionio

      - name: Test legion-tty
        run: brew test legionio/tap/legion-tty

      - name: Audit formulas
        run: |
          brew audit --strict legionio/tap/legionio-ruby || true
          brew audit --strict legionio/tap/legionio || true
          brew audit --strict legionio/tap/legion-tty || true

      - name: Cleanup tap
        if: always()
        run: |
          TAP_DIR="$(brew --repository)/Library/Taps/legionio/homebrew-tap"
          rm -rf "$TAP_DIR"
          touch "$TAP_DIR"

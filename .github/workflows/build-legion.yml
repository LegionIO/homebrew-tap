name: Build Legion

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ruby_version:
        description: "Ruby version to build"
        required: true
        default: "3.4.9"
      legionio_version:
        description: "legionio gem version (validated against RubyGems)"
        required: true
        default: "1.4.95"
      package_revision:
        description: "Package revision (increment for same Ruby + gem versions)"
        required: true
        default: "1"
  repository_dispatch:
    types: [build-legion]

concurrency:
  group: build-legion
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    outputs:
      gem_version: ${{ steps.version.outputs.gem_version }}
      pkg_revision: ${{ steps.version.outputs.pkg_revision }}
      tag: ${{ steps.version.outputs.tag }}
      tarball: ${{ steps.version.outputs.tarball }}
      full_version: ${{ steps.version.outputs.full_version }}

    strategy:
      matrix:
        include:
          - os: macos-14
            arch: arm64
            suffix: darwin-arm64

    runs-on: ${{ matrix.os }}

    env:
      RUBY_VERSION: ${{ inputs.ruby_version || github.event.client_payload.ruby_version || '3.4.9' }}
      GEM_VERSION: ${{ inputs.legionio_version || github.event.client_payload.legionio_version }}
      PKG_REVISION: ${{ inputs.package_revision || github.event.client_payload.package_revision || '1' }}
      SUFFIX: ${{ matrix.suffix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate legionio gem exists on RubyGems
        if: env.GEM_VERSION != ''
        run: |
          MAX_ATTEMPTS=10
          WAIT_SECONDS=30
          for i in $(seq 1 $MAX_ATTEMPTS); do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://rubygems.org/api/v2/rubygems/legionio/versions/${GEM_VERSION}.json")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Validated: legionio ${GEM_VERSION} exists on RubyGems (attempt ${i})"
              exit 0
            fi
            echo "Attempt ${i}/${MAX_ATTEMPTS}: legionio ${GEM_VERSION} not found (HTTP ${HTTP_STATUS}), waiting ${WAIT_SECONDS}s..."
            sleep $WAIT_SECONDS
          done
          echo "::error::legionio ${GEM_VERSION} not found on RubyGems after ${MAX_ATTEMPTS} attempts"
          echo "Available versions:"
          curl -s "https://rubygems.org/api/v1/versions/legionio.json" | jq -r '.[0:5] | .[].number'
          exit 1

      - name: Compute version tag (auto-increment revision)
        if: env.GEM_VERSION != ''
        id: version
        run: |
          LATEST=$(gh release list --limit 100 --json tagName --jq \
            '[.[] | select(.tagName | startswith("legion-'"${GEM_VERSION}"'-")) | .tagName | ltrimstr("legion-'"${GEM_VERSION}"'-") | tonumber] | max // 0')
          NEXT=$(( LATEST + 1 ))
          if [ "${PKG_REVISION}" -gt "${NEXT}" ] 2>/dev/null; then
            NEXT="${PKG_REVISION}"
          fi
          echo "Existing max revision for ${GEM_VERSION}: ${LATEST}, using: ${NEXT}"
          echo "gem_version=${GEM_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=legion-${GEM_VERSION}-${NEXT}" >> "$GITHUB_OUTPUT"
          echo "full_version=${GEM_VERSION}-${NEXT}" >> "$GITHUB_OUTPUT"
          echo "tarball=legion-${GEM_VERSION}-${NEXT}-${SUFFIX}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "pkg_revision=${NEXT}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache compiled Ruby
        uses: actions/cache@v4
        id: ruby-cache
        with:
          path: legion-ruby
          key: ruby-${{ inputs.ruby_version }}-${{ matrix.suffix }}-v6-${{ hashFiles('.github/workflows/build-legion.yml') }}
          restore-keys: ruby-${{ inputs.ruby_version }}-${{ matrix.suffix }}-v6-

      - name: Cache Homebrew packages
        if: steps.ruby-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew/downloads
            ~/Library/Caches/Homebrew/api
          key: brew-${{ matrix.suffix }}-${{ hashFiles('.github/workflows/build-legion.yml') }}
          restore-keys: brew-${{ matrix.suffix }}-

      - name: Install build dependencies
        if: steps.ruby-cache.outputs.cache-hit != 'true'
        run: |
          brew install openssl@3 libyaml rust postgresql@17 mysql-client sqlite snappy krb5

      - name: Download Ruby source
        if: steps.ruby-cache.outputs.cache-hit != 'true'
        run: |
          MINOR="${RUBY_VERSION%.*}"
          curl -fSL "https://cache.ruby-lang.org/pub/ruby/${MINOR}/ruby-${RUBY_VERSION}.tar.gz" \
            -o "ruby-${RUBY_VERSION}.tar.gz"
          tar xzf "ruby-${RUBY_VERSION}.tar.gz"

      - name: Configure and compile Ruby
        if: steps.ruby-cache.outputs.cache-hit != 'true'
        run: |
          cd "ruby-${RUBY_VERSION}"
          ./configure \
            --enable-yjit \
            --enable-load-relative \
            --disable-install-doc \
            --prefix="$GITHUB_WORKSPACE/legion-ruby" \
            --with-openssl-dir="$(brew --prefix openssl@3)" \
            --with-libyaml-dir="$(brew --prefix libyaml)"
          make -j$(sysctl -n hw.ncpu)
          make install

      - name: Install native extension gems
        if: steps.ruby-cache.outputs.cache-hit != 'true'
        run: |
          export PATH="$GITHUB_WORKSPACE/legion-ruby/bin:$PATH"

          gem install bundler --no-document --force
          bundle config set --global ssl_verify_mode none

          gem install sqlite3 --no-document -- \
            --with-sqlite3-dir="$(brew --prefix sqlite)"
          gem install oj --no-document
          gem install puma --no-document
          gem install nio4r --no-document
          gem install racc --no-document --force
          gem install snappy --no-document -- \
            --with-snappy-dir="$(brew --prefix snappy)"
          gem install concurrent-ruby concurrent-ruby-ext --no-document
          gem install pg --no-document -- \
            --with-pg-config="$(brew --prefix postgresql@17)/bin/pg_config"
          gem install mysql2 --no-document -- \
            --with-mysql-config="$(brew --prefix mysql-client)/bin/mysql_config"
          gem install bootsnap --no-document
          gem install msgpack --no-document
          gem install ed25519 --no-document
          gem install rbtree --no-document

      - name: Install Legion gems
        if: env.GEM_VERSION != ''
        run: |
          export PATH="$GITHUB_WORKSPACE/legion-ruby/bin:$PATH"

          MAX_WAIT=30
          INTERVAL=5
          ELAPSED=0
          until gem install legionio -v ">= ${GEM_VERSION}" --no-document; do
            ELAPSED=$((ELAPSED + INTERVAL))
            if [ "$ELAPSED" -ge "$MAX_WAIT" ]; then
              echo "::error::Failed to install legionio >= ${GEM_VERSION} after ${MAX_WAIT}s"
              exit 1
            fi
            echo "legionio >= ${GEM_VERSION} not yet available, retrying in ${INTERVAL}s (${ELAPSED}/${MAX_WAIT}s)..."
            sleep "$INTERVAL"
          done

          gem install legion-data legion-transport legion-cache \
            legion-crypt legion-settings legion-llm legion-gaia legion-mcp \
            legion-rbac legion-json legion-logging legion-tty \
            --no-document
          gem install lex-synapse lex-node lex-llm-gateway lex-metering lex-detect \
            lex-http lex-tasker lex-conditioner lex-transformer lex-scheduler \
            lex-lex lex-health lex-exec lex-codegen lex-telemetry lex-audit \
            lex-privatecore lex-tick lex-kerberos \
            --no-document

          echo "=== Installed gems ==="
          gem list

      - name: Update Legion and LEX gems to latest
        if: env.GEM_VERSION != ''
        run: |
          export PATH="$GITHUB_WORKSPACE/legion-ruby/bin:$PATH"

          echo "=== Updating all legion-* gems ==="
          gem list --no-versions | grep '^legion-' | xargs gem update --no-document || true

          echo "=== Updating all lex-* gems ==="
          gem list --no-versions | grep '^lex-' | xargs gem update --no-document || true

          echo "=== Cleaning up old gem versions ==="
          gem cleanup

          echo "=== Final gem list ==="
          gem list | grep -E '^(legion|lex-|legionio)'

      - name: Vendor native libraries
        if: steps.ruby-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$GITHUB_WORKSPACE/legion-ruby/libexec"
          LIBEXEC="$GITHUB_WORKSPACE/legion-ruby/libexec"
          BREW_PREFIX="$(brew --prefix)"

          find_dylib() {
            local dir="$1"
            local pattern="$2"
            local found
            found="$(find "$dir" -maxdepth 1 -name "${pattern}" -type f -o -name "${pattern}" -type l | head -1)"
            if [ -n "$found" ] && [ -L "$found" ]; then
              readlink -f "$found" 2>/dev/null || greadlink -f "$found" 2>/dev/null || echo "$found"
            else
              echo "$found"
            fi
          }

          copy_with_deps() {
            local src="$1"
            if [ ! -f "$src" ]; then
              echo "WARNING: skipping missing dylib: $src"
              return
            fi
            local name
            name="$(basename "$src")"
            if [ -f "$LIBEXEC/$name" ]; then
              return
            fi
            echo "Vendoring: $name"
            cp -L "$src" "$LIBEXEC/$name"
            otool -L "$src" | awk '{print $1}' | grep "$BREW_PREFIX" | while read -r dep; do
              dep_basename="$(basename "$dep")"
              if [ "$dep_basename" != "$name" ] && [ -f "$dep" ]; then
                copy_with_deps "$dep"
              elif [ "$dep_basename" != "$name" ]; then
                local dep_dir
                dep_dir="$(dirname "$src")"
                if [ -f "$dep_dir/$dep_basename" ]; then
                  copy_with_deps "$dep_dir/$dep_basename"
                fi
              fi
            done
          }

          PG_LIB="$(brew --prefix postgresql@17)/lib"
          MYSQL_LIB="$(brew --prefix mysql-client)/lib"
          SSL_LIB="$(brew --prefix openssl@3)/lib"
          YAML_LIB="$(brew --prefix libyaml)/lib"
          SNAPPY_LIB="$(brew --prefix snappy)/lib"
          KRB5_LIB="$(brew --prefix krb5)/lib"

          PQ_DYLIB="$(find_dylib "$PG_LIB" "libpq.*.dylib")"
          MYSQL_DYLIB="$(find_dylib "$MYSQL_LIB" "libmysqlclient.*.dylib")"
          SSL_DYLIB="$(find_dylib "$SSL_LIB" "libssl.*.dylib")"
          CRYPTO_DYLIB="$(find_dylib "$SSL_LIB" "libcrypto.*.dylib")"
          YAML_DYLIB="$(find_dylib "$YAML_LIB" "libyaml*.dylib")"
          SNAPPY_DYLIB="$(find_dylib "$SNAPPY_LIB" "libsnappy.*.dylib")"
          GSSAPI_DYLIB="$(find_dylib "$KRB5_LIB" "libgssapi_krb5.dylib" || find_dylib "$KRB5_LIB" "libgssapi_krb5.*.dylib")"
          KRB5_DYLIB="$(find_dylib "$KRB5_LIB" "libkrb5.dylib" || find_dylib "$KRB5_LIB" "libkrb5.*.dylib")"
          K5CRYPTO_DYLIB="$(find_dylib "$KRB5_LIB" "libk5crypto*.dylib")"
          KRB5SUPPORT_DYLIB="$(find_dylib "$KRB5_LIB" "libkrb5support*.dylib")"
          COM_ERR_DYLIB="$(find_dylib "$KRB5_LIB" "libcom_err*.dylib")"

          copy_with_deps "$PQ_DYLIB"
          copy_with_deps "$MYSQL_DYLIB"
          copy_with_deps "$SSL_DYLIB"
          copy_with_deps "$CRYPTO_DYLIB"
          copy_with_deps "$YAML_DYLIB"
          copy_with_deps "$SNAPPY_DYLIB"
          copy_with_deps "$GSSAPI_DYLIB"
          copy_with_deps "$KRB5_DYLIB"
          copy_with_deps "$K5CRYPTO_DYLIB"
          copy_with_deps "$KRB5SUPPORT_DYLIB"
          copy_with_deps "$COM_ERR_DYLIB"

          # Explicitly assert that required MIT Kerberos dylibs were vendored.
          if ! ls "$LIBEXEC"/libgssapi_krb5*.dylib > /dev/null 2>&1; then
            echo "ERROR: Required Kerberos library libgssapi_krb5*.dylib not found in $LIBEXEC" >&2
            exit 1
          fi
          if ! ls "$LIBEXEC"/libkrb5*.dylib > /dev/null 2>&1; then
            echo "ERROR: Required Kerberos library libkrb5*.dylib not found in $LIBEXEC" >&2
            exit 1
          fi

          echo "=== Vendored files ==="
          ls -la "$LIBEXEC"

      - name: Rewrite dylib load paths
        if: steps.ruby-cache.outputs.cache-hit != 'true'
        run: |
          LIBEXEC="$GITHUB_WORKSPACE/legion-ruby/libexec"
          BREW_PREFIX="$(brew --prefix)"

          for dylib in "$LIBEXEC"/*.dylib; do
            name="$(basename "$dylib")"
            install_name_tool -id "@rpath/$name" "$dylib"
          done

          for dylib in "$LIBEXEC"/*.dylib; do
            for dep in "$LIBEXEC"/*.dylib; do
              dep_name="$(basename "$dep")"
              old_ref="$(otool -L "$dylib" | awk '{print $1}' | grep "${BREW_PREFIX}.*${dep_name}" | head -1)"
              if [ -n "$old_ref" ]; then
                install_name_tool -change "$old_ref" "@rpath/$dep_name" "$dylib"
              fi
            done
          done

          RUBY_BIN="$GITHUB_WORKSPACE/legion-ruby/bin/ruby"
          LIBRUBY_PATH="$(find "$GITHUB_WORKSPACE/legion-ruby/lib" -name 'libruby*.dylib' | head -1)"

          for target in "$RUBY_BIN" $LIBRUBY_PATH; do
            [ -f "$target" ] || continue
            otool -L "$target" | awk '{print $1}' | grep "$BREW_PREFIX" | while read -r ref; do
              ref_name="$(basename "$ref")"
              if [ -f "$LIBEXEC/$ref_name" ]; then
                install_name_tool -change "$ref" "@rpath/$ref_name" "$target"
              fi
            done
            install_name_tool -add_rpath "@executable_path/../libexec" "$target" 2>/dev/null || true
            install_name_tool -add_rpath "$LIBEXEC" "$target" 2>/dev/null || true
          done

          if [ -n "$LIBRUBY_PATH" ]; then
            libruby_name="$(basename "$LIBRUBY_PATH")"
            install_name_tool -id "@rpath/$libruby_name" "$LIBRUBY_PATH" 2>/dev/null || true
          fi

          find "$GITHUB_WORKSPACE/legion-ruby" -name '*.bundle' | while read -r bundle; do
            otool -L "$bundle" | awk '{print $1}' | grep "$BREW_PREFIX" | while read -r ref; do
              ref_name="$(basename "$ref")"
              if [ -f "$LIBEXEC/$ref_name" ]; then
                install_name_tool -change "$ref" "@rpath/$ref_name" "$bundle"
              fi
            done
            install_name_tool -add_rpath "@executable_path/../libexec" "$bundle" 2>/dev/null || true
            install_name_tool -add_rpath "$LIBEXEC" "$bundle" 2>/dev/null || true
          done

      - name: Ad-hoc codesign all native binaries
        if: steps.ruby-cache.outputs.cache-hit != 'true'
        run: |
          find "$GITHUB_WORKSPACE/legion-ruby" -name '*.bundle' | while read -r bundle; do
            codesign --force --sign - "$bundle"
          done
          find "$GITHUB_WORKSPACE/legion-ruby" -name '*.dylib' | while read -r dylib; do
            codesign --force --sign - "$dylib"
          done
          codesign --force --sign - "$GITHUB_WORKSPACE/legion-ruby/bin/ruby"

          UNSIGNED="$(find "$GITHUB_WORKSPACE/legion-ruby" \( -name '*.bundle' -o -name '*.dylib' \) \
            -exec sh -c 'codesign -v "$1" 2>&1 | grep -q "not signed" && echo "$1"' _ {} \;)"
          if [ -n "$UNSIGNED" ]; then
            echo "ERROR: unsigned binaries remain:"
            echo "$UNSIGNED"
            exit 1
          fi
          echo "All native binaries signed"

      - name: Patch gssapi loader for vendored krb5
        if: steps.ruby-cache.outputs.cache-hit != 'true'
        run: |
          echo "=== Patching gssapi gem to load krb5 by name (respects DYLD_FALLBACK_LIBRARY_PATH) ==="
          LOADER="$(find "$GITHUB_WORKSPACE/legion-ruby" -path '*/gssapi-*/lib/gssapi/lib_gssapi_loader.rb' | head -1)"
          if [ -n "$LOADER" ]; then
            echo "Found loader: $LOADER"
            # Replace any absolute path to libgssapi_krb5.dylib with just the bare name.
            # This covers both the original (/usr/lib/) and any brew --prefix patch.
            sed -i '' "s|gssapi_lib = '/usr/lib/libgssapi_krb5.dylib'|gssapi_lib = 'libgssapi_krb5.dylib'|" "$LOADER"
            # Also handle the brew --prefix patched version from build-ruby.yml
            sed -i '' '/brew_lib.*brew --prefix krb5/c\
            gssapi_lib = '"'"'libgssapi_krb5.dylib'"'"'' "$LOADER"
            echo "Patched loader contents:"
            grep -n 'gssapi_lib' "$LOADER"
          else
            echo "WARNING: gssapi loader not found — gssapi gem may not be installed"
          fi

      - name: Verify build
        if: env.GEM_VERSION != ''
        run: |
          export PATH="$GITHUB_WORKSPACE/legion-ruby/bin:$PATH"
          KRB5_PREFIX="$(brew --prefix krb5 2>/dev/null || true)"
          if [ -n "$KRB5_PREFIX" ]; then
            export DYLD_FALLBACK_LIBRARY_PATH="$GITHUB_WORKSPACE/legion-ruby/libexec:$KRB5_PREFIX/lib${DYLD_FALLBACK_LIBRARY_PATH:+:$DYLD_FALLBACK_LIBRARY_PATH}"
          else
            export DYLD_FALLBACK_LIBRARY_PATH="$GITHUB_WORKSPACE/legion-ruby/libexec${DYLD_FALLBACK_LIBRARY_PATH:+:$DYLD_FALLBACK_LIBRARY_PATH}"
          fi

          echo "=== Ruby ==="
          ruby -v
          ruby -e "RubyVM::YJIT.enable; puts 'YJIT: ' + RubyVM::YJIT.enabled?.to_s"

          echo "=== Native gems ==="
          ruby -e "require 'sqlite3'; puts 'sqlite3 OK'"
          ruby -e "require 'oj'; puts 'oj OK'"
          ruby -e "require 'puma'; puts 'puma OK'"
          ruby -e "require 'snappy'; puts 'snappy OK'"
          ruby -e "require 'pg'; puts 'pg OK'"
          ruby -e "require 'mysql2'; puts 'mysql2 OK'"
          ruby -e "require 'concurrent'; puts 'concurrent-ruby OK'"
          ruby -e "require 'bootsnap'; puts 'bootsnap OK'"
          ruby -e "require 'msgpack'; puts 'msgpack OK'"
          ruby -e "require 'ed25519'; puts 'ed25519 OK'"
          ruby -e "require 'rbtree'; puts 'rbtree OK'"
          ruby <<'RUBY'
            require 'ffi'
            require 'gssapi'

            libs = []
            ObjectSpace.each_object(FFI::DynamicLibrary) do |dl|
              name = (dl.respond_to?(:name) ? dl.name : nil) rescue nil
              next unless name
              libs << name if name.include?('libgssapi_krb5')
            end

            if libs.empty?
              warn "ERROR: gssapi loaded but no libgssapi_krb5* library was found via FFI"
              exit 1
            end

            if libs.include?('/usr/lib/libgssapi_krb5.dylib')
              warn "ERROR: gssapi is using system Heimdal (/usr/lib/libgssapi_krb5.dylib)"
              exit 1
            end

            puts "gssapi OK (libs: #{libs.join(', ')})"
          RUBY

          echo "=== Legion gems ==="
          INSTALLED="$(ruby -e "require 'legion/version'; puts Legion::VERSION")"
          echo "legionio: ${INSTALLED}"
          ruby -e "require 'legion/data/version'; puts 'legion-data: ' + Legion::Data::VERSION"
          ruby -e "require 'legion/transport/version'; puts 'legion-transport: ' + Legion::Transport::VERSION"
          ruby -e "require 'legion/tty/version'; puts 'legion-tty: ' + Legion::TTY::VERSION"

          if ruby -e "exit(Gem::Version.new('${INSTALLED}') >= Gem::Version.new('${GEM_VERSION}') ? 0 : 1)"; then
            echo "Version check passed: ${INSTALLED} >= ${GEM_VERSION}"
          else
            echo "::error::Version mismatch: installed ${INSTALLED} < requested ${GEM_VERSION}"
            exit 1
          fi

          BREW_PREFIX="$(brew --prefix)"
          BAD_BUNDLES="$(find "$GITHUB_WORKSPACE/legion-ruby" -name '*.bundle' \
            -exec sh -c 'otool -L "$1" | grep -q "'"$BREW_PREFIX"'" && echo "$1"' _ {} \;)"
          if [ -n "$BAD_BUNDLES" ]; then
            echo "ERROR: .bundle files still reference Homebrew prefix:"
            echo "$BAD_BUNDLES"
            exit 1
          fi
          echo "No .bundle files reference Homebrew prefix"

      - name: Strip dead weight from package
        if: env.GEM_VERSION != ''
        run: |
          GEM_DIR="$GITHUB_WORKSPACE/legion-ruby/lib/ruby/gems/3.4.0"

          echo "=== Before strip ==="
          find "$GITHUB_WORKSPACE/legion-ruby" -type f | wc -l

          # Remove cached .gem tarballs (only needed for reinstall, not runtime)
          rm -rf "$GEM_DIR/cache"

          # Remove test/spec/doc/.github directories from gems
          find "$GEM_DIR/gems" -maxdepth 2 -type d \
            \( -name spec -o -name test -o -name tests -o -name doc -o -name docs \
               -o -name .github -o -name .circleci -o -name .travis \) \
            -exec rm -rf {} + 2>/dev/null || true

          # Remove standalone non-essential files from gems
          find "$GEM_DIR/gems" -maxdepth 2 -type f \
            \( -name '*.md' -not -name 'README*' -not -name 'LICENSE*' \
               -o -name '.rspec' -o -name '.rubocop*' -o -name '.yardopts' \
               -o -name 'Rakefile' -o -name 'Gemfile' -o -name 'Gemfile.lock' \
               -o -name '.gitignore' -o -name '.editorconfig' \) \
            -delete 2>/dev/null || true

          # Set --no-document as default for any future gem installs
          mkdir -p "$GITHUB_WORKSPACE/legion-ruby/etc"
          echo "gem: --no-document" > "$GITHUB_WORKSPACE/legion-ruby/etc/gemrc"

          echo "=== After strip ==="
          find "$GITHUB_WORKSPACE/legion-ruby" -type f | wc -l

      - name: Package
        if: env.GEM_VERSION != ''
        run: |
          TARBALL="${LEGION_TARBALL}"
          tar czf "$TARBALL" legion-ruby/
        env:
          LEGION_TARBALL: ${{ steps.version.outputs.tarball }}

      - name: Upload artifact
        if: env.GEM_VERSION != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.tarball }}
          path: ${{ steps.version.outputs.tarball }}
          retention-days: 30

      - name: Create GitHub Release
        if: env.GEM_VERSION != ''
        run: |
          gh release create "$LEGION_TAG" \
            --title "Legion ${LEGION_FULL_VERSION} (${SUFFIX})" \
            --notes "Legion ${GEM_VERSION} with Ruby ${RUBY_VERSION} (revision ${PKG_REVISION}). Self-contained: Ruby + YJIT + all native gems + all Legion/LEX gems + legion-tty." \
            "$LEGION_TARBALL"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LEGION_TAG: ${{ steps.version.outputs.tag }}
          LEGION_TARBALL: ${{ steps.version.outputs.tarball }}
          LEGION_FULL_VERSION: ${{ steps.version.outputs.full_version }}

  update-formula:
    needs: build
    if: needs.build.outputs.gem_version != ''
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download tarball for SHA256
        run: |
          TAG="${LEGION_TAG}"
          TARBALL="${LEGION_TARBALL}"
          gh release download "$TAG" --pattern "$TARBALL" --clobber
          SHA="$(shasum -a 256 "$TARBALL" | awk '{print $1}')"
          echo "SHA256=$SHA" >> "$GITHUB_ENV"
          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "FULL_VERSION=${LEGION_FULL_VERSION}" >> "$GITHUB_ENV"
        env:
          LEGION_TAG: ${{ needs.build.outputs.tag }}
          LEGION_TARBALL: ${{ needs.build.outputs.tarball }}
          LEGION_FULL_VERSION: ${{ needs.build.outputs.full_version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update formula
        run: |
          FORMULA="Formula/legionio.rb"
          URL="https://github.com/LegionIO/homebrew-tap/releases/download/${TAG}/${TARBALL}"
          sed -i '' "s|url \".*\"|url \"${URL}\"|" "$FORMULA"
          sed -i '' "s|sha256 \".*\"|sha256 \"${SHA256}\"|" "$FORMULA"
          sed -i '' "s|version \".*\"|version \"${FULL_VERSION}\"|" "$FORMULA"
          echo "=== Updated formula ==="
          head -8 "$FORMULA"

      - name: Commit formula update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/legionio.rb
          git commit -m "bump legionio to ${FULL_VERSION}" || echo "No changes to commit"
          git pull --rebase origin main
          git push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trigger-bottles:
    needs: update-formula
    if: needs.update-formula.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger bottle build
        run: |
          gh api repos/LegionIO/homebrew-tap/dispatches \
            -f event_type=build-bottles
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

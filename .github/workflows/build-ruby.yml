name: Build Ruby for Legion

on:
  workflow_dispatch:
    inputs:
      ruby_version:
        description: "Ruby version to build"
        required: true
        default: "3.4.8"
      package_revision:
        description: "Package revision (increment when gems change, same Ruby)"
        required: true
        default: "8"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            arch: arm64
            suffix: darwin-arm64
          - os: ubuntu-22.04
            arch: x86_64
            suffix: linux-x86_64

    runs-on: ${{ matrix.os }}

    env:
      RUBY_VERSION: ${{ inputs.ruby_version }}
      PKG_REVISION: ${{ inputs.package_revision }}
      SUFFIX: ${{ matrix.suffix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute version tag
        id: version
        run: |
          echo "tag=ruby-${RUBY_VERSION}-${PKG_REVISION}" >> "$GITHUB_OUTPUT"
          echo "full_version=${RUBY_VERSION}-${PKG_REVISION}" >> "$GITHUB_OUTPUT"
          echo "tarball=legion-ruby-${RUBY_VERSION}-${PKG_REVISION}-${SUFFIX}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Cache compiled Ruby
        uses: actions/cache@v4
        id: ruby-cache
        with:
          path: legion-ruby
          key: ruby-${{ inputs.ruby_version }}-${{ matrix.suffix }}-v5-${{ hashFiles('.github/workflows/build-ruby.yml') }}
          restore-keys: ruby-${{ inputs.ruby_version }}-${{ matrix.suffix }}-v5-

      - name: Cache Homebrew packages
        if: steps.ruby-cache.outputs.cache-hit != 'true' && runner.os == 'macOS'
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew/downloads
            ~/Library/Caches/Homebrew/api
          key: brew-${{ matrix.suffix }}-${{ hashFiles('.github/workflows/build-ruby.yml') }}
          restore-keys: brew-${{ matrix.suffix }}-

      - name: Install build dependencies (macOS)
        if: steps.ruby-cache.outputs.cache-hit != 'true' && runner.os == 'macOS'
        run: |
          brew install openssl@3 libyaml rust postgresql@17 mysql-client sqlite snappy krb5

      - name: Install build dependencies (Linux)
        if: steps.ruby-cache.outputs.cache-hit != 'true' && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential autoconf bison rustc \
            libssl-dev libyaml-dev libreadline-dev zlib1g-dev \
            libffi-dev libgdbm-dev libncurses-dev \
            libpq-dev libmysqlclient-dev libsqlite3-dev libsnappy-dev \
            libkrb5-dev patchelf

      - name: Download Ruby source
        if: steps.ruby-cache.outputs.cache-hit != 'true'
        run: |
          MINOR="${RUBY_VERSION%.*}"
          curl -fSL "https://cache.ruby-lang.org/pub/ruby/${MINOR}/ruby-${RUBY_VERSION}.tar.gz" \
            -o "ruby-${RUBY_VERSION}.tar.gz"
          tar xzf "ruby-${RUBY_VERSION}.tar.gz"

      - name: Configure and compile Ruby
        if: steps.ruby-cache.outputs.cache-hit != 'true'
        run: |
          cd "ruby-${RUBY_VERSION}"

          if [ "$(uname)" = "Darwin" ]; then
            OPENSSL_DIR="$(brew --prefix openssl@3)"
            LIBYAML_DIR="$(brew --prefix libyaml)"
            NCPU="$(sysctl -n hw.ncpu)"
          else
            OPENSSL_DIR="/usr"
            LIBYAML_DIR="/usr"
            NCPU="$(nproc)"
          fi

          ./configure \
            --enable-yjit \
            --enable-load-relative \
            --disable-install-doc \
            --prefix="$GITHUB_WORKSPACE/legion-ruby" \
            --with-openssl-dir="$OPENSSL_DIR" \
            --with-libyaml-dir="$LIBYAML_DIR"
          make -j"$NCPU"
          make install

      - name: Install native extension gems
        if: steps.ruby-cache.outputs.cache-hit != 'true'
        run: |
          export PATH="$GITHUB_WORKSPACE/legion-ruby/bin:$PATH"

          gem install bundler --no-document --force
          bundle config set --global ssl_verify_mode none

          if [ "$(uname)" = "Darwin" ]; then
            gem install sqlite3 --no-document -- \
              --with-sqlite3-dir="$(brew --prefix sqlite)"
          else
            gem install sqlite3 --no-document
          fi

          gem install oj --no-document
          gem install puma --no-document
          gem install nio4r --no-document
          gem install racc --no-document --force

          if [ "$(uname)" = "Darwin" ]; then
            gem install snappy --no-document -- \
              --with-snappy-dir="$(brew --prefix snappy)"
          else
            gem install snappy --no-document
          fi

          gem install concurrent-ruby concurrent-ruby-ext --no-document

          if [ "$(uname)" = "Darwin" ]; then
            gem install pg --no-document -- \
              --with-pg-config="$(brew --prefix postgresql@17)/bin/pg_config"
            gem install mysql2 --no-document -- \
              --with-mysql-config="$(brew --prefix mysql-client)/bin/mysql_config"
          else
            gem install pg --no-document
            gem install mysql2 --no-document
          fi

          gem install bootsnap --no-document
          gem install msgpack --no-document
          gem install ed25519 --no-document
          gem install rbtree --no-document
          gem install ffi --no-document
          gem install gssapi --no-document

          echo "=== Cleaning up old gem versions ==="
          gem cleanup

          echo "=== Stripping legion/lex gems (must only live in legionio formula) ==="
          GEM_DIR="$GITHUB_WORKSPACE/legion-ruby/lib/ruby/gems"
          STRIPPED=0
          find "$GEM_DIR" -maxdepth 2 -name "gems" -type d | while read -r gems_dir; do
            for gem_dir in "$gems_dir"/legionio-* "$gems_dir"/legion-* "$gems_dir"/lex-*; do
              [ -d "$gem_dir" ] || continue
              rm -rf "$gem_dir" && echo "  stripped gems/$(basename "$gem_dir")"
            done
            spec_dir="$(dirname "$gems_dir")/specifications"
            for spec_file in "$spec_dir"/legionio-* "$spec_dir"/legion-* "$spec_dir"/lex-*; do
              [ -f "$spec_file" ] || continue
              rm -f "$spec_file" && echo "  stripped specs/$(basename "$spec_file")"
            done
            cache_dir="$(dirname "$gems_dir")/cache"
            for cache_file in "$cache_dir"/legionio-* "$cache_dir"/legion-* "$cache_dir"/lex-*; do
              [ -f "$cache_file" ] || continue
              rm -f "$cache_file"
            done
          done || true
          echo "=== Strip complete ==="

          echo "=== Patching gssapi gem to load krb5 by name (respects DYLD_FALLBACK_LIBRARY_PATH) ==="
          if [ "$(uname)" = "Darwin" ]; then
            LOADER="$(find "$GITHUB_WORKSPACE/legion-ruby" -path '*/gssapi-*/lib/gssapi/lib_gssapi_loader.rb' | head -1)"
            if [ -n "$LOADER" ]; then
              sed -i '' "s|gssapi_lib = '/usr/lib/libgssapi_krb5.dylib'|gssapi_lib = 'libgssapi_krb5.dylib'|" "$LOADER"
              echo "  Patched: $LOADER"
              grep -n 'gssapi_lib' "$LOADER" || true
            else
              echo "  WARNING: gssapi loader not found"
            fi
          fi

          echo "=== Installed gems ==="
          gem list

      - name: Vendor native libraries (macOS)
        if: steps.ruby-cache.outputs.cache-hit != 'true' && runner.os == 'macOS'
        run: |
          mkdir -p "$GITHUB_WORKSPACE/legion-ruby/libexec"
          LIBEXEC="$GITHUB_WORKSPACE/legion-ruby/libexec"
          BREW_PREFIX="$(brew --prefix)"

          # Find the actual dylib file, following symlinks
          find_dylib() {
            local dir="$1"
            local pattern="$2"
            local found
            found="$(find "$dir" -maxdepth 1 -name "${pattern}" -type f -o -name "${pattern}" -type l | head -1)"
            if [ -n "$found" ] && [ -L "$found" ]; then
              readlink -f "$found" 2>/dev/null || greadlink -f "$found" 2>/dev/null || echo "$found"
            else
              echo "$found"
            fi
          }

          # Recursively copy a dylib and its Homebrew dependencies
          copy_with_deps() {
            local src="$1"
            if [ ! -f "$src" ]; then
              echo "WARNING: skipping missing dylib: $src"
              return
            fi
            local name
            name="$(basename "$src")"
            if [ -f "$LIBEXEC/$name" ]; then
              return
            fi
            echo "Vendoring: $name"
            cp -L "$src" "$LIBEXEC/$name"
            otool -L "$src" | awk '{print $1}' | grep "$BREW_PREFIX" | while read -r dep; do
              dep_basename="$(basename "$dep")"
              if [ "$dep_basename" != "$name" ] && [ -f "$dep" ]; then
                copy_with_deps "$dep"
              elif [ "$dep_basename" != "$name" ]; then
                local dep_dir
                dep_dir="$(dirname "$src")"
                if [ -f "$dep_dir/$dep_basename" ]; then
                  copy_with_deps "$dep_dir/$dep_basename"
                fi
              fi
            done
          }

          PG_LIB="$(brew --prefix postgresql@17)/lib"
          MYSQL_LIB="$(brew --prefix mysql-client)/lib"
          SSL_LIB="$(brew --prefix openssl@3)/lib"
          YAML_LIB="$(brew --prefix libyaml)/lib"
          SNAPPY_LIB="$(brew --prefix snappy)/lib"
          KRB5_LIB="$(brew --prefix krb5)/lib"

          echo "=== Discovering dylibs ==="
          echo "PG_LIB: $PG_LIB"
          ls -la "$PG_LIB"/libpq* 2>/dev/null || echo "No libpq files found"
          echo "MYSQL_LIB: $MYSQL_LIB"
          ls -la "$MYSQL_LIB"/libmysqlclient* 2>/dev/null || echo "No libmysqlclient files found"
          echo "SSL_LIB: $SSL_LIB"
          ls -la "$SSL_LIB"/libssl* 2>/dev/null || echo "No libssl files found"
          echo "YAML_LIB: $YAML_LIB"
          ls -la "$YAML_LIB"/libyaml* 2>/dev/null || echo "No libyaml files found"
          echo "SNAPPY_LIB: $SNAPPY_LIB"
          ls -la "$SNAPPY_LIB"/libsnappy* 2>/dev/null || echo "No libsnappy files found"
          echo "KRB5_LIB: $KRB5_LIB"
          ls -la "$KRB5_LIB"/libgssapi_krb5* "$KRB5_LIB"/libkrb5* "$KRB5_LIB"/libk5crypto* "$KRB5_LIB"/libcom_err* 2>/dev/null || echo "No krb5 files found"

          PQ_DYLIB="$(find_dylib "$PG_LIB" "libpq.*.dylib")"
          MYSQL_DYLIB="$(find_dylib "$MYSQL_LIB" "libmysqlclient.*.dylib")"
          SSL_DYLIB="$(find_dylib "$SSL_LIB" "libssl.*.dylib")"
          CRYPTO_DYLIB="$(find_dylib "$SSL_LIB" "libcrypto.*.dylib")"
          YAML_DYLIB="$(find_dylib "$YAML_LIB" "libyaml*.dylib")"
          SNAPPY_DYLIB="$(find_dylib "$SNAPPY_LIB" "libsnappy.*.dylib")"
          GSSAPI_DYLIB="$(find_dylib "$KRB5_LIB" "libgssapi_krb5.*.dylib")"
          KRB5_DYLIB="$(find_dylib "$KRB5_LIB" "libkrb5.*.dylib")"
          K5CRYPTO_DYLIB="$(find_dylib "$KRB5_LIB" "libk5crypto.*.dylib")"
          COM_ERR_DYLIB="$(find_dylib "$KRB5_LIB" "libcom_err.*.dylib")"
          KRB5SUPPORT_DYLIB="$(find_dylib "$KRB5_LIB" "libkrb5support.*.dylib")"

          echo "=== Resolved dylib paths ==="
          echo "libpq:          $PQ_DYLIB"
          echo "libmysqlclient: $MYSQL_DYLIB"
          echo "libssl:         $SSL_DYLIB"
          echo "libcrypto:      $CRYPTO_DYLIB"
          echo "libyaml:        $YAML_DYLIB"
          echo "libsnappy:      $SNAPPY_DYLIB"
          echo "libgssapi_krb5: $GSSAPI_DYLIB"
          echo "libkrb5:        $KRB5_DYLIB"
          echo "libk5crypto:    $K5CRYPTO_DYLIB"
          echo "libcom_err:     $COM_ERR_DYLIB"
          echo "libkrb5support: $KRB5SUPPORT_DYLIB"

          copy_with_deps "$PQ_DYLIB"
          copy_with_deps "$MYSQL_DYLIB"
          copy_with_deps "$SSL_DYLIB"
          copy_with_deps "$CRYPTO_DYLIB"
          copy_with_deps "$YAML_DYLIB"
          copy_with_deps "$SNAPPY_DYLIB"
          copy_with_deps "$GSSAPI_DYLIB"
          copy_with_deps "$KRB5_DYLIB"
          copy_with_deps "$K5CRYPTO_DYLIB"
          copy_with_deps "$COM_ERR_DYLIB"
          copy_with_deps "$KRB5SUPPORT_DYLIB"

          echo "=== Vendored files ==="
          ls -la "$LIBEXEC"

      - name: Vendor native libraries (Linux)
        if: steps.ruby-cache.outputs.cache-hit != 'true' && runner.os == 'Linux'
        run: |
          mkdir -p "$GITHUB_WORKSPACE/legion-ruby/libexec"
          LIBEXEC="$GITHUB_WORKSPACE/legion-ruby/libexec"

          copy_with_deps() {
            local src="$1"
            if [ ! -f "$src" ]; then
              echo "WARNING: skipping missing lib: $src"
              return
            fi
            local name
            name="$(basename "$src")"
            if [ -f "$LIBEXEC/$name" ]; then
              return
            fi
            echo "Vendoring: $name"
            cp -L "$src" "$LIBEXEC/$name"
            # Vendor non-system transitive dependencies
            ldd "$src" 2>/dev/null | grep "=> /" | awk '{print $3}' | while read -r dep; do
              dep_basename="$(basename "$dep")"
              case "$dep_basename" in
                libc.so*|libm.so*|libpthread.so*|libdl.so*|librt.so*|ld-linux*|linux-vdso*) continue ;;
              esac
              if [ ! -f "$LIBEXEC/$dep_basename" ] && [ -f "$dep" ]; then
                copy_with_deps "$dep"
              fi
            done
          }

          for lib in libpq libmysqlclient libssl libcrypto libyaml libsnappy libgssapi_krb5 libkrb5 libk5crypto libcom_err libkrb5support; do
            SO_FILE="$(ldconfig -p 2>/dev/null | grep "${lib}\\.so" | head -1 | awk '{print $NF}')"
            if [ -n "$SO_FILE" ] && [ -f "$SO_FILE" ]; then
              copy_with_deps "$SO_FILE"
            else
              echo "Searching /usr/lib for ${lib}"
              SO_FILE="$(find /usr/lib -name "${lib}.so*" -type f 2>/dev/null | head -1)"
              if [ -n "$SO_FILE" ]; then
                copy_with_deps "$SO_FILE"
              else
                echo "WARNING: ${lib} not found"
              fi
            fi
          done

          echo "=== Vendored files ==="
          ls -la "$LIBEXEC"

      - name: Rewrite dylib load paths (macOS)
        if: steps.ruby-cache.outputs.cache-hit != 'true' && runner.os == 'macOS'
        run: |
          LIBEXEC="$GITHUB_WORKSPACE/legion-ruby/libexec"
          BREW_PREFIX="$(brew --prefix)"

          for dylib in "$LIBEXEC"/*.dylib; do
            name="$(basename "$dylib")"
            install_name_tool -id "@rpath/$name" "$dylib"
          done

          for dylib in "$LIBEXEC"/*.dylib; do
            for dep in "$LIBEXEC"/*.dylib; do
              dep_name="$(basename "$dep")"
              old_ref="$(otool -L "$dylib" | awk '{print $1}' | grep "${BREW_PREFIX}.*${dep_name}" | head -1)"
              if [ -n "$old_ref" ]; then
                install_name_tool -change "$old_ref" "@rpath/$dep_name" "$dylib"
              fi
            done
          done

          RUBY_BIN="$GITHUB_WORKSPACE/legion-ruby/bin/ruby"
          LIBRUBY_PATH="$(find "$GITHUB_WORKSPACE/legion-ruby/lib" -name 'libruby*.dylib' | head -1)"

          for target in "$RUBY_BIN" $LIBRUBY_PATH; do
            [ -f "$target" ] || continue
            otool -L "$target" | awk '{print $1}' | grep "$BREW_PREFIX" | while read -r ref; do
              ref_name="$(basename "$ref")"
              if [ -f "$LIBEXEC/$ref_name" ]; then
                install_name_tool -change "$ref" "@rpath/$ref_name" "$target"
              fi
            done
            install_name_tool -add_rpath "@executable_path/../libexec" "$target" 2>/dev/null || true
            install_name_tool -add_rpath "$LIBEXEC" "$target" 2>/dev/null || true
          done

          if [ -n "$LIBRUBY_PATH" ]; then
            libruby_name="$(basename "$LIBRUBY_PATH")"
            install_name_tool -id "@rpath/$libruby_name" "$LIBRUBY_PATH" 2>/dev/null || true
          fi

          find "$GITHUB_WORKSPACE/legion-ruby" -name '*.bundle' | while read -r bundle; do
            otool -L "$bundle" | awk '{print $1}' | grep "$BREW_PREFIX" | while read -r ref; do
              ref_name="$(basename "$ref")"
              if [ -f "$LIBEXEC/$ref_name" ]; then
                install_name_tool -change "$ref" "@rpath/$ref_name" "$bundle"
              fi
            done
            install_name_tool -add_rpath "@executable_path/../libexec" "$bundle" 2>/dev/null || true
            install_name_tool -add_rpath "$LIBEXEC" "$bundle" 2>/dev/null || true
          done

      - name: Rewrite shared library paths (Linux)
        if: steps.ruby-cache.outputs.cache-hit != 'true' && runner.os == 'Linux'
        run: |
          LIBEXEC="$GITHUB_WORKSPACE/legion-ruby/libexec"
          PREFIX="$GITHUB_WORKSPACE/legion-ruby"

          # Set RPATH on vendored .so files so they find each other
          for so in "$LIBEXEC"/*.so*; do
            [ -f "$so" ] || continue
            patchelf --set-rpath '$ORIGIN' "$so" 2>/dev/null || true
          done

          # Set RPATH on ruby binary
          RUBY_BIN="$PREFIX/bin/ruby"
          if [ -f "$RUBY_BIN" ]; then
            patchelf --set-rpath '$ORIGIN/../libexec:$ORIGIN/../lib' "$RUBY_BIN" 2>/dev/null || true
          fi

          # Set RPATH on libruby
          LIBRUBY="$(find "$PREFIX/lib" -name 'libruby*.so*' -type f | head -1)"
          if [ -n "$LIBRUBY" ]; then
            patchelf --set-rpath '$ORIGIN:$ORIGIN/../libexec' "$LIBRUBY" 2>/dev/null || true
          fi

          # Set RPATH on gem native extension .so files
          find "$PREFIX" -name '*.so' -path '*/gems/*' | while read -r ext; do
            patchelf --set-rpath "\$ORIGIN:$LIBEXEC" "$ext" 2>/dev/null || true
          done

      - name: Ad-hoc codesign all native binaries
        if: steps.ruby-cache.outputs.cache-hit != 'true' && runner.os == 'macOS'
        run: |
          echo "=== Signing .bundle files ==="
          find "$GITHUB_WORKSPACE/legion-ruby" -name '*.bundle' | while read -r bundle; do
            codesign --force --sign - "$bundle"
            echo "  signed: $(basename "$bundle")"
          done

          echo "=== Signing .dylib files ==="
          find "$GITHUB_WORKSPACE/legion-ruby" -name '*.dylib' | while read -r dylib; do
            codesign --force --sign - "$dylib"
            echo "  signed: $(basename "$dylib")"
          done

          echo "=== Signing ruby binary ==="
          codesign --force --sign - "$GITHUB_WORKSPACE/legion-ruby/bin/ruby"

          echo "=== Verifying signatures ==="
          UNSIGNED="$(find "$GITHUB_WORKSPACE/legion-ruby" \( -name '*.bundle' -o -name '*.dylib' \) \
            -exec sh -c 'codesign -v "$1" 2>&1 | grep -q "not signed" && echo "$1"' _ {} \;)"
          if [ -n "$UNSIGNED" ]; then
            echo "ERROR: unsigned binaries remain:"
            echo "$UNSIGNED"
            exit 1
          fi
          echo "All native binaries signed — OK"

      - name: Verify build
        run: |
          export PATH="$GITHUB_WORKSPACE/legion-ruby/bin:$PATH"

          if [ "$(uname)" = "Linux" ]; then
            export LD_LIBRARY_PATH="$GITHUB_WORKSPACE/legion-ruby/libexec${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
          fi

          echo "=== Ruby info ==="
          ruby -v

          YJIT_RESULT="$(ruby -e "RubyVM::YJIT.enable; puts RubyVM::YJIT.enabled?")"
          if [ "$YJIT_RESULT" != "true" ]; then
            echo "ERROR: YJIT is not enabled"
            exit 1
          fi
          echo "YJIT: OK"

          ruby -e "require 'sqlite3'; puts 'sqlite3 OK'"
          ruby -e "require 'oj'; puts 'oj OK'"
          ruby -e "require 'puma'; puts 'puma OK'"
          ruby -e "require 'snappy'; puts 'snappy OK'"
          ruby -e "require 'pg'; puts 'pg OK'"
          ruby -e "require 'mysql2'; puts 'mysql2 OK'"
          ruby -e "require 'concurrent'; puts 'concurrent-ruby OK'"
          ruby -e "require 'bootsnap'; puts 'bootsnap OK'"
          ruby -e "require 'msgpack'; puts 'msgpack OK'"
          ruby -e "require 'ed25519'; puts 'ed25519 OK'"
          ruby -e "require 'rbtree'; puts 'rbtree OK'"
          ruby -e "require 'ffi'; puts 'ffi OK'"
          ruby -e "require 'gssapi'; puts 'gssapi OK'"

          if [ "$(uname)" = "Darwin" ]; then
            BREW_PREFIX="$(brew --prefix)"
            BAD_BUNDLES="$(find "$GITHUB_WORKSPACE/legion-ruby" -name '*.bundle' \
              -exec sh -c 'otool -L "$1" | grep -q "'"$BREW_PREFIX"'" && echo "$1"' _ {} \;)"
            if [ -n "$BAD_BUNDLES" ]; then
              echo "ERROR: .bundle files still reference Homebrew prefix:"
              echo "$BAD_BUNDLES"
              exit 1
            fi
            echo "No .bundle files reference Homebrew prefix — OK"
          else
            BAD_SO="$(find "$GITHUB_WORKSPACE/legion-ruby" -name '*.so' -path '*/gems/*' \
              -exec sh -c 'ldd "$1" 2>/dev/null | grep "not found" && echo "  in: $1"' _ {} \;)"
            if [ -n "$BAD_SO" ]; then
              echo "WARNING: some .so files have unresolved dependencies:"
              echo "$BAD_SO"
            fi
            echo "Shared library check complete"
          fi

      - name: Strip build-time artifacts
        run: |
          PREFIX="$GITHUB_WORKSPACE/legion-ruby"
          rm -f "$PREFIX"/lib/libruby*-static.a
          rm -rf "$PREFIX"/include
          rm -rf "$PREFIX"/lib/ruby/gems/*/cache
          find "$PREFIX" -name '*.o' -delete
          find "$PREFIX"/lib/ruby/gems/*/gems -maxdepth 2 -type d \
            \( -name spec -o -name test \) -exec rm -rf {} + 2>/dev/null || true
          for gem in rbs typeprof debug; do
            rm -rf "$PREFIX"/lib/ruby/gems/*/gems/${gem}-*
            rm -f "$PREFIX"/lib/ruby/gems/*/specifications/${gem}-*.gemspec
          done
          echo "=== Post-strip size ==="
          du -sh "$PREFIX"
          find "$PREFIX" -type f | wc -l
          test ! -f "$PREFIX/lib/libruby.3.4-static.a"
          test ! -d "$PREFIX/include"
          test ! -d "$PREFIX/lib/ruby/gems/3.4.0/cache"
          ! find "$PREFIX" -name '*.o' | grep -q . || exit 1

      - name: Package artifact
        run: |
          TARBALL="${{ steps.version.outputs.tarball }}"
          tar czf "$TARBALL" legion-ruby/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.tarball }}
          path: ${{ steps.version.outputs.tarball }}
          retention-days: 30

      - name: Create GitHub Release
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          TARBALL="${{ steps.version.outputs.tarball }}"
          FULL_VERSION="${{ steps.version.outputs.full_version }}"

          # Both matrix jobs share the same tag — first to finish creates the release,
          # second uploads its tarball to the existing release
          if ! gh release create "$TAG" \
            --title "Legion Ruby ${FULL_VERSION}" \
            --notes "Pre-compiled Ruby ${RUBY_VERSION} (package revision ${PKG_REVISION}) for Legion. Includes YJIT and native extension gems only (pg, mysql2, sqlite3, oj, puma, bootsnap). Legion/LEX gems are installed separately via the legionio and legion-tty formulas." \
            "$TARBALL" 2>/dev/null; then
            echo "Release $TAG already exists, uploading tarball"
            gh release upload "$TAG" "$TARBALL" --clobber
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-formula:
    needs: build
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download tarball for SHA256
        run: |
          TAG="ruby-${{ inputs.ruby_version }}-${{ inputs.package_revision }}"
          TARBALL="legion-ruby-${{ inputs.ruby_version }}-${{ inputs.package_revision }}-darwin-arm64.tar.gz"
          gh release download "$TAG" --pattern "$TARBALL"
          SHA="$(shasum -a 256 "$TARBALL" | awk '{print $1}')"
          echo "SHA256=$SHA" >> "$GITHUB_ENV"
          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "FULL_VERSION=${{ inputs.ruby_version }}-${{ inputs.package_revision }}" >> "$GITHUB_ENV"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update formula
        run: |
          FORMULA="Formula/legionio-ruby.rb"
          URL="https://github.com/LegionIO/homebrew-tap/releases/download/${TAG}/${TARBALL}"

          # Update url
          sed -i '' "s|url \".*\"|url \"${URL}\"|" "$FORMULA"

          # Update sha256
          sed -i '' "s|sha256 \".*\"|sha256 \"${SHA256}\"|" "$FORMULA"

          # Update version
          sed -i '' "s|version \".*\"|version \"${FULL_VERSION}\"|" "$FORMULA"

          echo "=== Updated formula ==="
          head -8 "$FORMULA"

      - name: Commit formula update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/legionio-ruby.rb
          git commit -m "bump legionio-ruby to ${FULL_VERSION}" || echo "No changes to commit"
          git pull --rebase origin main
          git push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

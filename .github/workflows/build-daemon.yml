name: Build Daemon Gems

on:
  workflow_dispatch:
    inputs:
      legionio_version:
        description: "legionio gem version"
        required: true
        default: "1.4.78"
      package_revision:
        description: "Package revision"
        required: true
        default: "1"
  repository_dispatch:
    types: [build-daemon]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14

    env:
      GEM_VERSION: ${{ inputs.legionio_version || github.event.client_payload.legionio_version || '1.4.79' }}
      PKG_REVISION: ${{ inputs.package_revision || '1' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate gem version exists on RubyGems
        run: |
          MAX_ATTEMPTS=10
          WAIT_SECONDS=30
          for i in $(seq 1 $MAX_ATTEMPTS); do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://rubygems.org/api/v2/rubygems/legionio/versions/${GEM_VERSION}.json")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Validated: legionio ${GEM_VERSION} exists on RubyGems (attempt ${i})"
              exit 0
            fi
            echo "Attempt ${i}/${MAX_ATTEMPTS}: legionio ${GEM_VERSION} not found (HTTP ${HTTP_STATUS}), waiting ${WAIT_SECONDS}s..."
            sleep $WAIT_SECONDS
          done
          echo "::error::legionio ${GEM_VERSION} not found on RubyGems after ${MAX_ATTEMPTS} attempts"
          echo "Available versions:"
          curl -s "https://rubygems.org/api/v1/versions/legionio.json" | jq -r '.[0:5] | .[].number'
          exit 1

      - name: Compute version tag
        id: version
        run: |
          echo "tag=legionio-${GEM_VERSION}-${PKG_REVISION}" >> "$GITHUB_OUTPUT"
          echo "full_version=${GEM_VERSION}-${PKG_REVISION}" >> "$GITHUB_OUTPUT"
          echo "tarball=legionio-gems-${GEM_VERSION}-${PKG_REVISION}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Download legionio-ruby tarball
        run: |
          LATEST_TAG="$(gh release list --repo "${{ github.repository }}" --limit 50 --json tagName --jq '[.[] | select(.tagName | startswith("ruby-"))][0].tagName')"
          LATEST_TARBALL="$(gh release view "$LATEST_TAG" --repo "${{ github.repository }}" --json assets --jq '.assets[0].name')"
          echo "Downloading $LATEST_TAG / $LATEST_TARBALL"
          gh release download "$LATEST_TAG" --repo "${{ github.repository }}" --pattern "$LATEST_TARBALL" --clobber
          mkdir -p legion-ruby
          tar xzf "$LATEST_TARBALL" --strip-components=1 -C legion-ruby
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install daemon gems
        run: |
          export PATH="$GITHUB_WORKSPACE/legion-ruby/bin:$PATH"
          RUBY_GEM_DIR="$(find "$GITHUB_WORKSPACE/legion-ruby/lib/ruby/gems" -maxdepth 1 -type d | tail -1)"

          mkdir -p "$GITHUB_WORKSPACE/daemon-gems"
          export GEM_HOME="$GITHUB_WORKSPACE/daemon-gems"
          export GEM_PATH="$GITHUB_WORKSPACE/daemon-gems:$RUBY_GEM_DIR"

          gem install legionio -v ">= ${GEM_VERSION}" --no-document
          gem install legion-data legion-transport legion-cache \
            legion-crypt legion-settings legion-llm legion-gaia legion-mcp \
            legion-rbac legion-json legion-logging legion-tty \
            lex-synapse lex-node lex-llm-gateway lex-metering lex-detect \
            lex-http lex-tasker lex-conditioner lex-transformer lex-scheduler \
            lex-lex lex-health lex-exec lex-codegen lex-telemetry lex-audit \
            lex-privatecore lex-tick lex-kerberos \
            prism \
            --no-document

          echo "=== Installed daemon gems ==="
          ls "$GEM_HOME/gems/"

      - name: Verify
        run: |
          export PATH="$GITHUB_WORKSPACE/legion-ruby/bin:$PATH"
          RUBY_GEM_DIR="$(find "$GITHUB_WORKSPACE/legion-ruby/lib/ruby/gems" -maxdepth 1 -type d | tail -1)"
          export GEM_PATH="$GITHUB_WORKSPACE/daemon-gems:$RUBY_GEM_DIR"

          INSTALLED="$(ruby -e "require 'legion/version'; puts Legion::VERSION")"
          echo "Installed legionio: ${INSTALLED}"
          ruby -e "require 'legion/data/version'; puts Legion::Data::VERSION"
          ruby -e "require 'legion/transport/version'; puts Legion::Transport::VERSION"

          if ruby -e "exit(Gem::Version.new('${INSTALLED}') >= Gem::Version.new('${GEM_VERSION}') ? 0 : 1)"; then
            echo "Version check passed: ${INSTALLED} >= ${GEM_VERSION}"
          else
            echo "::error::Version mismatch: installed ${INSTALLED} < requested ${GEM_VERSION}"
            exit 1
          fi

      - name: Package
        run: |
          TARBALL="${{ steps.version.outputs.tarball }}"
          mv daemon-gems gems
          tar czf "$TARBALL" gems/

      - name: Create GitHub Release
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          TARBALL="${{ steps.version.outputs.tarball }}"
          FULL_VERSION="${{ steps.version.outputs.full_version }}"
          gh release create "$TAG" --repo "${{ github.repository }}" \
            --title "LegionIO Daemon Gems ${FULL_VERSION}" \
            --notes "Pure-Ruby daemon, core, and agentic gems for LegionIO ${GEM_VERSION} (revision ${PKG_REVISION})." \
            "$TARBALL"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-formula:
    needs: build
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download tarball for SHA256
        run: |
          TAG="legionio-${GEM_VERSION}-${PKG_REVISION}"
          TARBALL="legionio-gems-${GEM_VERSION}-${PKG_REVISION}.tar.gz"
          gh release download "$TAG" --repo "${{ github.repository }}" --pattern "$TARBALL" --clobber
          SHA="$(shasum -a 256 "$TARBALL" | awk '{print $1}')"
          echo "SHA256=$SHA" >> "$GITHUB_ENV"
          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "FULL_VERSION=${GEM_VERSION}-${PKG_REVISION}" >> "$GITHUB_ENV"
        env:
          GEM_VERSION: ${{ inputs.legionio_version || github.event.client_payload.legionio_version || '1.4.79' }}
          PKG_REVISION: ${{ inputs.package_revision || '1' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update formula
        run: |
          FORMULA="Formula/legionio.rb"
          URL="https://github.com/LegionIO/homebrew-tap/releases/download/${TAG}/${TARBALL}"
          sed -i '' "s|url \".*\"|url \"${URL}\"|" "$FORMULA"
          sed -i '' "s|sha256 \".*\"|sha256 \"${SHA256}\"|" "$FORMULA"
          sed -i '' "s|version \".*\"|version \"${FULL_VERSION}\"|" "$FORMULA"
          echo "=== Updated formula ==="
          head -8 "$FORMULA"

      - name: Commit formula update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/legionio.rb
          git commit -m "bump legionio to ${FULL_VERSION}" || echo "No changes to commit"
          git pull --rebase origin main
          git push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trigger-tty:
    needs: update-formula
    runs-on: ubuntu-latest
    steps:
      - name: Check if TTY rebuild needed
        id: check
        run: |
          LATEST_TTY_TAG="$(gh release list --repo LegionIO/homebrew-tap --limit 50 \
            --json tagName --jq '[.[] | select(.tagName | startswith("legion-tty-"))][0].tagName')"
          echo "Latest TTY release tag: $LATEST_TTY_TAG"

          # Extract the gem version from the tag (e.g. legion-tty-0.4.28-2 -> 0.4.28)
          CURRENT_TTY_VERSION="$(echo "$LATEST_TTY_TAG" | sed 's/^legion-tty-//; s/-[0-9]*$//')"
          echo "Current TTY gem version in tap: $CURRENT_TTY_VERSION"

          # Check the latest legion-tty version on RubyGems
          LATEST_GEM_VERSION="$(curl -s https://rubygems.org/api/v1/gems/legion-tty.json | jq -r '.version')"
          echo "Latest legion-tty on RubyGems: $LATEST_GEM_VERSION"

          if [ "$CURRENT_TTY_VERSION" != "$LATEST_GEM_VERSION" ]; then
            echo "TTY gem version changed ($CURRENT_TTY_VERSION -> $LATEST_GEM_VERSION), triggering rebuild"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$LATEST_GEM_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "TTY gem version unchanged, skipping rebuild"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger TTY build
        if: steps.check.outputs.changed == 'true'
        run: |
          gh api repos/LegionIO/homebrew-tap/dispatches \
            -f event_type=build-tty \
            -f "client_payload[legion_tty_version]=${{ steps.check.outputs.version }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
